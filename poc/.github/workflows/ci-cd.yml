name: CI/CD Pipeline — La Petite Maison de l'Épouvante

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  test-auth:
    name: "01 · Tests auth-service"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: poc/auth-service
        run: npm install
      - name: Run tests
        working-directory: poc/auth-service
        run: npm test

  test-product:
    name: "02 · Tests product-service"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: poc/product-service
        run: npm install
      - name: Run tests
        working-directory: poc/product-service
        run: npm test

  security-scan:
    name: "03 · Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm audit auth-service
        working-directory: poc/auth-service
        run: npm install && npm audit --audit-level=critical
      - name: npm audit product-service
        working-directory: poc/product-service
        run: npm install && npm audit --audit-level=critical
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'
          severity: 'CRITICAL'
          format: 'table'

  build-push:
    name: "04 · Build & Push Docker"
    runs-on: ubuntu-latest
    needs: [test-auth, test-product, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./poc/auth-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth-service:latest
      - name: Build & Push product-service
        uses: docker/build-push-action@v5
        with:
          context: ./poc/product-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/product-service:latest
      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./poc/frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest